<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Fichaje - EOI Embajadores</title>
  <style>
    :root { --brand-primary: #1e5631; --brand-light: #a4de02; --success: #2e7d32; --danger: #c62828; }
    body { font-family: sans-serif; background: #f1f5f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .container { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: var(--brand-primary); font-size: 20px; text-align: center; }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    .btn-entrada { background: var(--success); color: white; }
    .btn-salida { background: var(--danger); color: white; }
    .btn-solicitar { background: var(--brand-light); color: #1e5631; margin-top: 10px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Teletrabajo EOI Embajadores</h1>
    <div class="btn-group">
      <button class="btn-entrada" onclick="fichar('Entrada')">Entrada</button>
      <button class="btn-salida" onclick="fichar('Salida')">Salida</button>
    </div>
    <button class="btn-solicitar" onclick="abrirModal()">📝 Solicitar Teletrabajo</button>
  </div>

  <div id="solicitudModal" class="modal">
    <div class="modal-content">
      <h2>Solicitar Permiso</h2>
      <input type="date" id="fechaInicio" style="width:100%; margin-bottom:10px;">
      <input type="date" id="fechaFin" style="width:100%; margin-bottom:10px;">
      <button onclick="enviarSolicitud()" style="background:var(--brand-primary); color:white;">Enviar</button>
      <button onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://script.google.com/a/macros/educa.madrid.org/s/AKfycbzzXWStCEzapsW6q3mDEs_zH5iZk1JU2DpVL-i1fzdJuwrBH4pY6wvUFVzZUhuKhpSP0Q/exec";

    function fichar(tipo) { window.open(BACKEND_URL + "?tipo=" + tipo, "_blank"); }
    function abrirModal() { document.getElementById('solicitudModal').style.display = 'flex'; }
    function cerrarModal() { document.getElementById('solicitudModal').style.display = 'none'; }
    
    function enviarSolicitud() {
      const fInicio = document.getElementById('fechaInicio').value;
      const fFin = document.getElementById('fechaFin').value;
      if(!fInicio || !fFin) return alert("Completa las fechas");
      
      const urlFinal = BACKEND_URL + "?action=solicitarPermiso&fechaInicio=" + fInicio + "&fechaFin=" + fFin;
      window.open(urlFinal, "_blank");
      cerrarModal();
    }
  </script>
</body>
</html>
