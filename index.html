<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Teletrabajo EOI EMBAJADORES</title>
  <style>
    :root { --main-color: #1e5631; --accent-color: #a4de02; --bg-color: #f8f9fa; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 20px; }
    .section { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
    #estado-permiso { padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; text-align: center; }
  </style>
</head>
<body>
  <h1>Teletrabajo EOI EMBAJADORES</h1>
  <div id="estado-permiso">Consultando permiso...</div>
  
  <section class="section">
    <h2>Solicitar Teletrabajo</h2>
    <div id="container-fechas">
      <div>Inicio: <input type="date" class="fi"> Fin: <input type="date" class="ff"></div>
    </div>
    <button onclick="agregarFila()" style="background:#eee;">+ Añadir periodo</button>
    <button onclick="solicitar()" style="background:var(--accent-color);">Enviar Solicitud</button>
  </section>

  <section class="section">
    <h2>Registro de Jornada</h2>
    <button style="background:var(--main-color); color:white;" onclick="ejecutar('Entrada')">Registrar Entrada</button>
    <button style="background:#c62828; color:white;" onclick="ejecutar('Salida')">Registrar Salida</button>
  </section>

  <script>
    const BACKEND_URL = "https://script.google.com/a/macros/educa.madrid.org/s/AKfycbxKFKJ4X1rvJBDjHR5lgecPvmDAVC7CJipZykzPxILO5zb9dvWfyGs9TMRKwEjH1f01xA/exec";
    
    window.onload = () => {
      google.script.run.withSuccessHandler(actualizarUI).obtenerEstadoPermiso();
    };

    function actualizarUI(estado) {
      const box = document.getElementById('estado-permiso');
      if(estado === "AUTOMATICO" || estado === "CONCEDIDO") {
        box.style.background = "#d1e7dd"; box.innerHTML = "✅ Permiso activo para hoy: " + estado;
      } else {
        box.style.background = "#f8d7da"; box.innerHTML = "❌ No tienes permiso para hoy.";
      }
    }

    function agregarFila() {
      const div = document.createElement('div');
      div.innerHTML = '<br>Inicio: <input type="date" class="fi"> Fin: <input type="date" class="ff">';
      document.getElementById('container-fechas').appendChild(div);
    }

    function solicitar() {
      let lista = [];
      document.querySelectorAll('.fi').forEach((el, i) => {
        if(el.value) lista.push(el.value + " a " + document.querySelectorAll('.ff')[i].value);
      });
      window.open(BACKEND_URL + "?action=solicitarPermiso&fechas=" + lista.join("|"), "_blank");
    }

    function ejecutar(tipo) {
      window.open(BACKEND_URL + "?tipo=" + tipo, "_blank");
    }
  </script>
</body>
</html>
